services:
  - type: web
    name: jizen-kakutei-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./
    region: oregon
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: MAX_TOKENS
        value: "4000"
      - key: COST_LIMIT_JPY_PER_REQUEST
        value: "100"
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/health
